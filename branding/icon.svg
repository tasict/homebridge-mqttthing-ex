<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338CA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- rounded app-style background -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- house outline (HomeKit style) -->
  <path d="M19 46 L50 20 L81 46" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M28 47 V72 a5 5 0 0 0 5 5 H67 a5 5 0 0 0 5-5 V47" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <!-- MQTT signal: dot + expanding arcs -->
  <circle cx="50" cy="65" r="4.2" fill="#22D3EE"/>
  <path d="M42.5 56.5 a10.5 10.5 0 0 1 15 0" fill="none" stroke="#22D3EE" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M36 49.5 a19.5 19.5 0 0 1 28 0" fill="none" stroke="#22D3EE" stroke-width="4.5" stroke-linecap="round"/>
  <!-- EX badge -->
  <rect x="58" y="66" width="34" height="20" rx="10" fill="#F59E0B"/>
  <!-- E (drawn as strokes so no font is required) -->
  <path d="M67 71.5 V80.5 M67 71.5 H73 M67 76 H72 M67 80.5 H73" fill="none" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- X -->
  <path d="M78 71.5 L85 80.5 M85 71.5 L78 80.5" fill="none" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round"/>
</svg>
